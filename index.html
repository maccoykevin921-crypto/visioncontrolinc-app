<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Control.INC Vision AI automotive intelligence platform for VIN diagnostics, vehicle system analysis and intelligent workshop tools.">
  <title>OEMlink Interface — Visioncontrol®</title>

  <style>
    :root {
      --charcoal: #1C1C1E;
      --snow: #FFFAFA;
      --dark-red: #8B0000;
      --muted: #6b6b6b;
      --card-width: 700px;
      --card-radius: 18px;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--charcoal);
      color: var(--charcoal);
    }

    .page {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      box-sizing: border-box;
    }

    .card {
      background: linear-gradient(180deg, var(--snow) 0%, #FFF9F8 100%);
      width: min(92vw, var(--card-width));
      border-radius: var(--card-radius);
      padding: 40px 48px 48px 48px;
      box-sizing: border-box;
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 4px;
      background: var(--dark-red);
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-top: 28px;
    }

    .logo h1 {
      margin: 0;
      font-size: 44px;
      color: #2f2f2f;
    }

    .vision {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-top: 6px;
    }

    .title {
      text-align: center;
      margin-top: 28px;
    }

    .title h2 {
      margin: 0;
      font-size: 36px;
      color: var(--dark-red);
    }

    .subtitle {
      text-align: center;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .copy {
      margin-top: 22px;
      color: #444;
      font-size: 14px;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
    }

    .divider {
      margin-top: 22px;
      border-bottom: 2px solid var(--dark-red);
      width: 70%;
      margin-left: auto;
      margin-right: auto;
    }

    .enter-btn {
      display: block;
      margin: 28px auto;
      padding: 12px 36px;
      background: var(--dark-red);
      color: var(--snow);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      font-size: 13px;
      color: #6d6d6d;
    }
  </style>
</head>

<body>

<div class="page">
  <div class="card">

    <div class="logo">
      <div>
        <h1>control.inc</h1>
        <div class="vision">vision</div>
      </div>
    </div>

    <div class="title">
      <h2>OEMlink Interface</h2>
      <div class="subtitle">UNIFIED CONTROL CORE SYSTEM</div>
    </div>

    <p class="copy">
      Unified engineering framework integrating diagnostics, automation and system intelligence.
    </p>

    <div class="divider"></div>

    <button class="enter-btn">Enter System</button>

    <footer>
      © 2025 control.inc® | VisionControlInk
    </footer>

  </div>
</div>

<!-- NEW SECTION -->
<div style="max-width:700px;margin:60px auto;text-align:center;color:#FFFAFA;font-family:Arial;">
  <h2>Control.INC® + Vision® Core</h2>
  <p>Unified AI system for real-time diagnostics.</p>
</div>

</body>
</html>
